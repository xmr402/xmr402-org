<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d18;stop-opacity:1" />
    </linearGradient>
    <!-- Orange glow -->
    <radialGradient id="orangeGlow" cx="30%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0" />
    </radialGradient>
    <!-- Red threat glow -->
    <radialGradient id="redGlow" cx="75%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#ff2244;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#ff2244;stop-opacity:0" />
    </radialGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc4400;stop-opacity:1" />
    </linearGradient>
    <!-- Eye gradient -->
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2244;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa0022;stop-opacity:1" />
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff6600" stroke-width="0.3" opacity="0.18"/>
    </pattern>
    <!-- Dots pattern -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#ff6600" opacity="0.12"/>
    </pattern>
    <!-- Clip path for shield -->
    <clipPath id="shieldClip">
      <path d="M 880 140 L 960 120 L 1040 140 L 1040 260 Q 1040 320 960 360 Q 880 320 880 260 Z"/>
    </clipPath>
    <!-- Filter for glow -->
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#orangeGlow)"/>
  <rect width="1200" height="630" fill="url(#redGlow)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Horizontal scan lines (subtle) -->
  <rect x="0" y="0" width="1200" height="1" fill="#ff6600" opacity="0.07"/>
  <rect x="0" y="210" width="1200" height="1" fill="#ff6600" opacity="0.05"/>
  <rect x="0" y="420" width="1200" height="1" fill="#ff6600" opacity="0.05"/>
  <rect x="0" y="629" width="1200" height="1" fill="#ff6600" opacity="0.07"/>

  <!-- Left decorative circuit lines -->
  <g opacity="0.25">
    <line x1="0" y1="120" x2="120" y2="120" stroke="#ff6600" stroke-width="1.5"/>
    <line x1="120" y1="120" x2="120" y2="200" stroke="#ff6600" stroke-width="1.5"/>
    <circle cx="120" cy="120" r="3" fill="#ff6600"/>
    <line x1="0" y1="200" x2="80" y2="200" stroke="#ff6600" stroke-width="1"/>
    <circle cx="80" cy="200" r="2" fill="#ff6600"/>
    <line x1="0" y1="500" x2="100" y2="500" stroke="#ff6600" stroke-width="1.5"/>
    <line x1="100" y1="500" x2="100" y2="450" stroke="#ff6600" stroke-width="1.5"/>
    <circle cx="100" cy="450" r="3" fill="#ff6600"/>
  </g>

  <!-- Right decorative circuit lines -->
  <g opacity="0.25">
    <line x1="1200" y1="150" x2="1100" y2="150" stroke="#ff2244" stroke-width="1.5"/>
    <line x1="1100" y1="150" x2="1100" y2="240" stroke="#ff2244" stroke-width="1.5"/>
    <circle cx="1100" cy="240" r="3" fill="#ff2244"/>
    <line x1="1200" y1="480" x2="1080" y2="480" stroke="#ff2244" stroke-width="1"/>
    <circle cx="1080" cy="480" r="2" fill="#ff2244"/>
  </g>

  <!-- ====== SHIELD (XMR402 - left side) ====== -->
  <g filter="url(#glowFilter)">
    <!-- Shield body -->
    <path d="M 220 150 L 320 128 L 420 150 L 420 290 Q 420 370 320 415 Q 220 370 220 290 Z"
          fill="none" stroke="#ff6600" stroke-width="2.5" opacity="0.9"/>
    <path d="M 228 158 L 320 138 L 412 158 L 412 288 Q 412 362 320 405 Q 228 362 228 288 Z"
          fill="#ff6600" opacity="0.08"/>

    <!-- Monero M symbol inside shield -->
    <text x="320" y="310" font-family="monospace" font-size="80" font-weight="bold"
          fill="#ff6600" text-anchor="middle" opacity="0.85">M</text>

    <!-- Lock icon at shield center top -->
    <rect x="304" y="178" width="32" height="24" rx="4" fill="#ff6600" opacity="0.9"/>
    <rect x="311" y="168" width="18" height="16" rx="9" fill="none" stroke="#ff6600" stroke-width="3" opacity="0.9"/>
    <circle cx="320" cy="192" r="4" fill="#0a0a0f"/>

    <!-- XMR402 label under shield -->
    <text x="320" y="448" font-family="monospace" font-size="18" fill="#ff6600" text-anchor="middle" letter-spacing="3" opacity="0.9">XMR402</text>
    <text x="320" y="470" font-family="monospace" font-size="11" fill="#ff6600" text-anchor="middle" letter-spacing="1" opacity="0.6">PRIVATE · STATELESS · ZERO FEES</text>
  </g>

  <!-- ====== SURVEILLANCE EYE (right side) ====== -->
  <g opacity="0.82">
    <!-- Eye outline -->
    <ellipse cx="880" cy="260" rx="110" ry="65" fill="none" stroke="#ff2244" stroke-width="2.5"/>
    <!-- Iris -->
    <circle cx="880" cy="260" r="42" fill="none" stroke="#ff2244" stroke-width="2"/>
    <circle cx="880" cy="260" r="42" fill="#ff2244" opacity="0.06"/>
    <!-- Pupil -->
    <circle cx="880" cy="260" r="22" fill="#ff2244" opacity="0.7"/>
    <circle cx="880" cy="260" r="12" fill="#0a0a0f"/>
    <circle cx="874" cy="254" r="5" fill="#ff2244" opacity="0.4"/>
    <!-- Scan lines through eye -->
    <line x1="770" y1="255" x2="990" y2="255" stroke="#ff2244" stroke-width="0.8" opacity="0.4"/>
    <line x1="770" y1="265" x2="990" y2="265" stroke="#ff2244" stroke-width="0.8" opacity="0.4"/>
    <!-- Radiating surveillance lines -->
    <line x1="880" y1="195" x2="880" y2="165" stroke="#ff2244" stroke-width="1.5" opacity="0.5"/>
    <line x1="920" y1="210" x2="945" y2="190" stroke="#ff2244" stroke-width="1.5" opacity="0.5"/>
    <line x1="840" y1="210" x2="815" y2="190" stroke="#ff2244" stroke-width="1.5" opacity="0.5"/>
    <line x1="880" y1="325" x2="880" y2="355" stroke="#ff2244" stroke-width="1.5" opacity="0.5"/>
    <!-- Eye label -->
    <text x="880" y="400" font-family="monospace" font-size="14" fill="#ff2244" text-anchor="middle" letter-spacing="2" opacity="0.8">PUBLIC BLOCKCHAIN</text>
    <text x="880" y="420" font-family="monospace" font-size="11" fill="#ff2244" text-anchor="middle" letter-spacing="1" opacity="0.55">EVERY PAYMENT VISIBLE</text>
  </g>

  <!-- ====== VS divider ====== -->
  <line x1="600" y1="120" x2="600" y2="510" stroke="#333344" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.7"/>
  <text x="600" y="285" font-family="monospace" font-size="22" fill="#555566" text-anchor="middle" opacity="0.8">VS</text>

  <!-- ====== Data flow nodes (bottom area) ====== -->
  <!-- Left side: XMR402 flow nodes -->
  <g opacity="0.7">
    <circle cx="180" cy="540" r="10" fill="none" stroke="#ff6600" stroke-width="1.5"/>
    <circle cx="260" cy="540" r="10" fill="none" stroke="#ff6600" stroke-width="1.5"/>
    <circle cx="340" cy="540" r="10" fill="none" stroke="#ff6600" stroke-width="1.5"/>
    <circle cx="420" cy="540" r="10" fill="none" stroke="#ff6600" stroke-width="1.5"/>
    <circle cx="500" cy="540" r="10" fill="none" stroke="#ff6600" stroke-width="1.5"/>
    <line x1="190" y1="540" x2="250" y2="540" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="270" y1="540" x2="330" y2="540" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="350" y1="540" x2="410" y2="540" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="430" y1="540" x2="490" y2="540" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="340" y="570" font-family="monospace" font-size="10" fill="#ff6600" text-anchor="middle" opacity="0.7" letter-spacing="1">PRIVATE · VERIFIED · 200ms</text>
  </g>

  <!-- Right side: x402 flow nodes (exposed) -->
  <g opacity="0.7">
    <circle cx="700" cy="540" r="10" fill="none" stroke="#ff2244" stroke-width="1.5"/>
    <circle cx="780" cy="540" r="10" fill="none" stroke="#ff2244" stroke-width="1.5"/>
    <circle cx="860" cy="540" r="10" fill="none" stroke="#ff2244" stroke-width="1.5"/>
    <circle cx="940" cy="540" r="10" fill="none" stroke="#ff2244" stroke-width="1.5"/>
    <circle cx="1020" cy="540" r="10" fill="none" stroke="#ff2244" stroke-width="1.5"/>
    <line x1="710" y1="540" x2="770" y2="540" stroke="#ff2244" stroke-width="1.5"/>
    <line x1="790" y1="540" x2="850" y2="540" stroke="#ff2244" stroke-width="1.5"/>
    <line x1="870" y1="540" x2="930" y2="540" stroke="#ff2244" stroke-width="1.5"/>
    <line x1="950" y1="540" x2="1010" y2="540" stroke="#ff2244" stroke-width="1.5"/>
    <!-- "exposed" markers above nodes -->
    <line x1="780" y1="530" x2="780" y2="510" stroke="#ff2244" stroke-width="1" opacity="0.7"/>
    <line x1="860" y1="530" x2="860" y2="510" stroke="#ff2244" stroke-width="1" opacity="0.7"/>
    <line x1="940" y1="530" x2="940" y2="510" stroke="#ff2244" stroke-width="1" opacity="0.7"/>
    <circle cx="780" cy="508" r="3" fill="#ff2244" opacity="0.7"/>
    <circle cx="860" cy="508" r="3" fill="#ff2244" opacity="0.7"/>
    <circle cx="940" cy="508" r="3" fill="#ff2244" opacity="0.7"/>
    <text x="860" y="570" font-family="monospace" font-size="10" fill="#ff2244" text-anchor="middle" opacity="0.7" letter-spacing="1">PUBLIC · TRACKABLE · EXPOSED</text>
  </g>

  <!-- ====== MAIN TITLE ====== -->
  <text x="600" y="64" font-family="'Arial', sans-serif" font-size="38" font-weight="bold"
        fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">
    The <tspan fill="#ff6600">Surveillance</tspan> Tax
  </text>
  <text x="600" y="98" font-family="'Arial', sans-serif" font-size="17"
        fill="#aaaacc" text-anchor="middle" letter-spacing="0.5">
    Why AI Agents Can't Afford Transparent Payment Trails
  </text>

  <!-- ====== XMR402.ORG watermark ====== -->
  <text x="600" y="610" font-family="monospace" font-size="13" fill="#555566"
        text-anchor="middle" letter-spacing="3" opacity="0.8">XMR402.ORG</text>

  <!-- Decorative corner brackets -->
  <!-- Top-left -->
  <path d="M 20 20 L 20 55 M 20 20 L 55 20" stroke="#ff6600" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Top-right -->
  <path d="M 1180 20 L 1180 55 M 1180 20 L 1145 20" stroke="#ff6600" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Bottom-left -->
  <path d="M 20 610 L 20 575 M 20 610 L 55 610" stroke="#ff6600" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Bottom-right -->
  <path d="M 1180 610 L 1180 575 M 1180 610 L 1145 610" stroke="#ff6600" stroke-width="2" fill="none" opacity="0.5"/>
</svg>
