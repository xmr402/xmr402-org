<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a2e" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ff3300;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative circuit lines -->
  <g stroke="#ff6600" stroke-width="1" opacity="0.15">
    <line x1="0" y1="200" x2="300" y2="200"/>
    <line x1="300" y1="200" x2="320" y2="180"/>
    <line x1="320" y1="180" x2="500" y2="180"/>
    <line x1="0" y1="450" x2="200" y2="450"/>
    <line x1="200" y1="450" x2="220" y2="430"/>
    <line x1="220" y1="430" x2="400" y2="430"/>
    <line x1="800" y1="100" x2="1200" y2="100"/>
    <line x1="900" y1="530" x2="1200" y2="530"/>
    <line x1="700" y1="530" x2="720" y2="510"/>
    <line x1="720" y1="510" x2="900" y2="510"/>
  </g>

  <!-- Corporate logos area - stylized building icons -->
  <g transform="translate(150, 180)" opacity="0.6">
    <!-- Visa icon -->
    <rect x="0" y="0" width="80" height="80" rx="12" fill="none" stroke="#4a4a6a" stroke-width="1.5"/>
    <text x="40" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a4a6a">VISA</text>
    <!-- Google icon -->
    <rect x="120" y="0" width="80" height="80" rx="12" fill="none" stroke="#4a4a6a" stroke-width="1.5"/>
    <text x="160" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a4a6a">AP2</text>
    <!-- Stripe icon -->
    <rect x="240" y="0" width="80" height="80" rx="12" fill="none" stroke="#4a4a6a" stroke-width="1.5"/>
    <text x="280" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a4a6a">MPP</text>
  </g>

  <!-- Arrow from corporate to surveillance eye -->
  <g opacity="0.3">
    <line x1="500" y1="220" x2="580" y2="220" stroke="#ff3333" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="580,215 595,220 580,225" fill="#ff3333"/>
  </g>

  <!-- Surveillance eye icon -->
  <g transform="translate(620, 190)" opacity="0.4">
    <ellipse cx="30" cy="30" rx="35" ry="20" fill="none" stroke="#ff3333" stroke-width="2"/>
    <circle cx="30" cy="30" r="10" fill="none" stroke="#ff3333" stroke-width="2"/>
    <circle cx="30" cy="30" r="4" fill="#ff3333"/>
  </g>

  <!-- VS divider -->
  <line x1="600" y1="290" x2="600" y2="400" stroke="#ff6600" stroke-width="1" opacity="0.4"/>
  <text x="600" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ff6600" opacity="0.6">VS</text>

  <!-- XMR402 shield icon -->
  <g transform="translate(750, 180)" filter="url(#glow)">
    <path d="M 60 0 L 120 30 L 120 80 L 60 110 L 0 80 L 0 30 Z" fill="none" stroke="#ff6600" stroke-width="2.5"/>
    <text x="60" y="50" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#ff6600">XMR</text>
    <text x="60" y="72" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#ff6600">402</text>
    <!-- Lock icon inside shield -->
    <rect x="48" y="82" width="24" height="16" rx="3" fill="none" stroke="#ff6600" stroke-width="1.5"/>
    <path d="M 54 82 L 54 76 C 54 70 66 70 66 76 L 66 82" fill="none" stroke="#ff6600" stroke-width="1.5"/>
  </g>

  <!-- Privacy rays from XMR402 -->
  <g opacity="0.15" stroke="#ff6600" stroke-width="1">
    <line x1="810" y1="240" x2="950" y2="160"/>
    <line x1="810" y1="240" x2="980" y2="220"/>
    <line x1="810" y1="240" x2="970" y2="290"/>
    <line x1="810" y1="240" x2="940" y2="340"/>
  </g>

  <!-- Small nodes at ray ends -->
  <g fill="#ff6600" opacity="0.3">
    <circle cx="950" cy="160" r="3"/>
    <circle cx="980" cy="220" r="3"/>
    <circle cx="970" cy="290" r="3"/>
    <circle cx="940" cy="340" r="3"/>
  </g>

  <!-- Title -->
  <text x="600" y="460" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" filter="url(#glow)">The Big Tech Payment Land Grab</text>
  <text x="600" y="500" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#cccccc">And Why They All Got Privacy Wrong</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#0a0a0f" opacity="0.8"/>
  <text x="40" y="605" font-family="monospace" font-size="16" fill="#ff6600">xmr402.org</text>
  <text x="1160" y="605" text-anchor="end" font-family="monospace" font-size="14" fill="#4a4a6a">2026-03-20</text>

  <!-- Accent line at bottom -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#orangeGlow)"/>
</svg>