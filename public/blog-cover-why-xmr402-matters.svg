<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0f0f1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff8833;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="300" r="200" fill="#ff6600" opacity="0.04" filter="url(#blur1)"/>
  <circle cx="1000" cy="200" r="250" fill="#ff6600" opacity="0.03" filter="url(#blur1)"/>
  <circle cx="600" cy="500" r="180" fill="#ff8833" opacity="0.03" filter="url(#blur1)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Circuit/network lines -->
  <g stroke="#ff6600" stroke-width="0.8" opacity="0.12" fill="none">
    <!-- Horizontal lines -->
    <line x1="80" y1="180" x2="350" y2="180"/>
    <line x1="850" y1="450" x2="1120" y2="450"/>
    <line x1="60" y1="480" x2="280" y2="480"/>
    <!-- Vertical lines -->
    <line x1="350" y1="180" x2="350" y2="260"/>
    <line x1="850" y1="380" x2="850" y2="450"/>
    <!-- Connection nodes -->
    <circle cx="80" cy="180" r="3" fill="#ff6600"/>
    <circle cx="350" cy="180" r="3" fill="#ff6600"/>
    <circle cx="350" cy="260" r="3" fill="#ff6600"/>
    <circle cx="850" cy="380" r="3" fill="#ff6600"/>
    <circle cx="850" cy="450" r="3" fill="#ff6600"/>
    <circle cx="1120" cy="450" r="3" fill="#ff6600"/>
    <circle cx="60" cy="480" r="3" fill="#ff6600"/>
    <circle cx="280" cy="480" r="3" fill="#ff6600"/>
  </g>

  <!-- Daily icons row (clock, API, wallet, shield, globe) -->
  <g transform="translate(600, 160)" text-anchor="middle">
    <!-- Clock icon -->
    <g transform="translate(-240, 0)" opacity="0.5">
      <circle cx="0" cy="0" r="22" stroke="#ff6600" stroke-width="1.5" fill="none"/>
      <line x1="0" y1="0" x2="0" y2="-12" stroke="#ff6600" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="8" y2="4" stroke="#ff6600" stroke-width="1.5" stroke-linecap="round"/>
      <text y="45" fill="#888888" font-family="monospace" font-size="10" text-anchor="middle">24/7</text>
    </g>
    <!-- API bracket icon -->
    <g transform="translate(-120, 0)" opacity="0.5">
      <text y="8" fill="#ff6600" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">&lt;/&gt;</text>
      <text y="45" fill="#888888" font-family="monospace" font-size="10" text-anchor="middle">API</text>
    </g>
    <!-- Shield icon -->
    <g transform="translate(0, 0)" opacity="0.5">
      <path d="M0,-22 L18,-12 L18,6 C18,16 0,26 0,26 C0,26 -18,16 -18,6 L-18,-12 Z" stroke="#ff6600" stroke-width="1.5" fill="none"/>
      <text y="45" fill="#888888" font-family="monospace" font-size="10" text-anchor="middle">PRIVACY</text>
    </g>
    <!-- Lightning bolt -->
    <g transform="translate(120, 0)" opacity="0.5">
      <path d="M4,-20 L-8,2 L2,2 L-4,22 L12,-4 L2,-4 Z" stroke="#ff6600" stroke-width="1.5" fill="#ff6600" fill-opacity="0.15"/>
      <text y="45" fill="#888888" font-family="monospace" font-size="10" text-anchor="middle">200ms</text>
    </g>
    <!-- Globe icon -->
    <g transform="translate(240, 0)" opacity="0.5">
      <circle cx="0" cy="0" r="20" stroke="#ff6600" stroke-width="1.5" fill="none"/>
      <ellipse cx="0" cy="0" rx="10" ry="20" stroke="#ff6600" stroke-width="0.8" fill="none"/>
      <line x1="-20" y1="0" x2="20" y2="0" stroke="#ff6600" stroke-width="0.8"/>
      <text y="45" fill="#888888" font-family="monospace" font-size="10" text-anchor="middle">GLOBAL</text>
    </g>
  </g>

  <!-- Main title -->
  <text x="600" y="310" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="900" letter-spacing="-1">
    WHY XMR402 MATTERS
  </text>
  <text x="600" y="370" text-anchor="middle" fill="#ff6600" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="900" letter-spacing="6">
    EVERY DAY
  </text>

  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" fill="#888888" font-family="monospace" font-size="14" letter-spacing="2">
    THE INVISIBLE PAYMENT LAYER POWERING THE MACHINE ECONOMY
  </text>

  <!-- Mini bar chart visualization -->
  <g transform="translate(380, 470)" opacity="0.6">
    <rect x="0" y="30" width="24" height="40" fill="#ff6600" opacity="0.3" rx="2"/>
    <rect x="35" y="20" width="24" height="50" fill="#ff6600" opacity="0.4" rx="2"/>
    <rect x="70" y="10" width="24" height="60" fill="#ff6600" opacity="0.5" rx="2"/>
    <rect x="105" y="0" width="24" height="70" fill="#ff6600" opacity="0.6" rx="2"/>
    <rect x="140" y="-15" width="24" height="85" fill="#ff6600" opacity="0.7" rx="2"/>
    <rect x="175" y="-35" width="24" height="105" fill="#ff6600" opacity="0.8" rx="2"/>
    <rect x="210" y="-60" width="24" height="130" fill="url(#accent)" rx="2"/>
    <text x="117" y="90" fill="#666666" font-family="monospace" font-size="9" text-anchor="middle">AGENT TRANSACTIONS GROWING DAILY</text>
  </g>

  <!-- Protocol badge -->
  <g transform="translate(600, 560)">
    <rect x="-80" y="-14" width="160" height="28" rx="4" fill="#ff6600" opacity="0.1" stroke="#ff6600" stroke-width="0.8"/>
    <text x="0" y="5" text-anchor="middle" fill="#ff6600" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="3">XMR402.ORG</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accent)"/>
</svg>